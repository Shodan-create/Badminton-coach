<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Badminton Coach – KI Videoanalyse</title>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

<!-- COCO-SSD Object Detection -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;

  background:
    linear-gradient(
      180deg,
      #0A2A20 0%,
      #0F3527 100%
    );

  color: #F5F2E8;

  font-family:
    Arial,
    Helvetica,
    sans-serif;

  padding: 20px;
}

.container {
  width: 100%;
  max-width: 1000px;
  margin: auto;
}

.back-button {
  display: inline-block;

  color: #CFE0D5;

  text-decoration: none;

  margin-bottom: 20px;

  font-size: 14px;
}

.back-button:hover {
  color: #D9AA3E;
}

.header {
  text-align: center;
  margin-bottom: 25px;
}

.header h1 {
  margin: 0 0 8px 0;
  font-size: 30px;
}

.header p {
  margin: 0;
  color: #CFE0D5;
}

/* PANEL */

.panel {
  background: #123C2D;

  border:
    1px solid
    rgba(248,246,240,0.12);

  border-radius: 14px;

  padding: 20px;

  margin-bottom: 20px;
}

/* UPLOAD */

.upload-area {
  text-align: center;

  padding: 25px;

  border:
    2px dashed
    rgba(248,246,240,0.25);

  border-radius: 12px;
}

.file-input {
  display: none;
}

.upload-button {
  display: inline-block;

  background: #D9AA3E;

  color: #2B2005;

  padding:
    13px
    20px;

  border-radius: 10px;

  font-weight: bold;

  cursor: pointer;

  margin-top: 12px;
}

.upload-button:hover {
  opacity: 0.9;
}

/* VIDEO */

.video-wrapper {

  display: none;

  position: relative;

  width: 100%;

  margin-top: 20px;

  background: black;

  border-radius: 12px;

  overflow: hidden;

  line-height: 0;
}

#video {

  display: block;

  width: 100%;

  height: auto;

  background: black;
}

/*
Canvas liegt exakt über dem Video.
Hier werden die grünen Boxen gezeichnet.
*/

#overlay {

  position: absolute;

  left: 0;
  top: 0;

  width: 100%;
  height: 100%;

  pointer-events: none;
}

/* CONTROLS */

.controls {

  display: none;

  gap: 10px;

  flex-wrap: wrap;

  margin-top: 15px;
}

button {

  cursor: pointer;

  border-radius: 8px;

  padding:
    10px
    15px;

  font-size: 14px;

  font-weight: bold;
}

.primary {

  background: #D9AA3E;

  color: #2B2005;

  border: none;
}

.secondary {

  background: transparent;

  color: #F5F2E8;

  border:
    1px solid
    rgba(248,246,240,0.2);
}

/* STATUS */

.status {

  margin-top: 15px;

  padding: 12px;

  border-radius: 8px;

  background:
    rgba(248,246,240,0.06);

  color: #CFE0D5;

  font-size: 14px;
}

/* ANALYSIS */

.analysis {

  display: none;
}

.analysis h2 {

  margin-top: 0;

}

.stats {

  display: grid;

  grid-template-columns:
    repeat(3, 1fr);

  gap: 10px;

  margin-top: 15px;
}

.stat {

  background:
    rgba(248,246,240,0.06);

  border-radius: 10px;

  padding: 15px;

  text-align: center;
}

.stat-number {

  font-size: 28px;

  font-weight: bold;

  color: #D9AA3E;
}

.stat-label {

  font-size: 12px;

  color: #CFE0D5;

  margin-top: 4px;
}

.loading {

  display: none;

  text-align: center;

  margin-top: 15px;

  color: #D9AA3E;

  font-weight: bold;
}

/* MOBILE */

@media (max-width: 600px) {

  body {
    padding: 12px;
  }

  .panel {
    padding: 15px;
  }

  .header h1 {
    font-size: 25px;
  }

  .stats {
    grid-template-columns:
      1fr;
  }

}

</style>

</head>


<body>

<div class="container">


<a
  href="index.html"
  class="back-button"
>
← Zurück zum Badminton Punkt-Tracker
</a>


<div class="header">

<h1>
🏸 KI Videoanalyse
</h1>

<p>
Automatische Spielererkennung mit Computer Vision
</p>

</div>


<!-- UPLOAD PANEL -->

<div class="panel">


<div class="upload-area">

<div>
Wähle dein Badminton-Video aus.
</div>


<label
  for="fileInput"
  class="upload-button"
>
📹 Video auswählen
</label>


<input
  id="fileInput"
  class="file-input"
  type="file"
  accept="video/*"
>


</div>


<!-- LOADING -->

<div
  id="loading"
  class="loading"
>
🤖 KI-Modell wird geladen...
</div>


<!-- VIDEO -->

<div
  id="videoWrapper"
  class="video-wrapper"
>


<video
  id="video"
  controls
  playsinline
  preload="metadata"
></video>


<canvas
  id="overlay"
></canvas>


</div>


<!-- CONTROLS -->

<div
  id="controls"
  class="controls"
>


<button
  id="startAnalysis"
  class="primary"
>
▶ KI-Analyse starten
</button>


<button
  id="stopAnalysis"
  class="secondary"
>
⏹ Analyse stoppen
</button>


</div>


<div
  id="status"
  class="status"
>
Noch kein Video ausgewählt.
</div>


</div>


<!-- ANALYSE RESULTATE -->


<div
  id="analysisPanel"
  class="panel analysis"
>


<h2>
📊 Live-Analyse
</h2>


<div class="stats">


<div class="stat">

<div
  id="playerCount"
  class="stat-number"
>
0
</div>

<div class="stat-label">
Erkannte Spieler
</div>

</div>


<div class="stat">

<div
  id="confidence"
  class="stat-number"
>
0%
</div>

<div class="stat-label">
Erkennungsgenauigkeit
</div>

</div>


<div class="stat">

<div
  id="frames"
  class="stat-number"
>
0
</div>

<div class="stat-label">
Analysierte Frames
</div>

</div>


</div>


</div>


</div>


<script>


// ==========================================
// ELEMENTE
// ==========================================


const fileInput =
  document.getElementById(
    "fileInput"
  );


const video =
  document.getElementById(
    "video"
  );


const videoWrapper =
  document.getElementById(
    "videoWrapper"
  );


const overlay =
  document.getElementById(
    "overlay"
  );


const ctx =
  overlay.getContext(
    "2d"
  );


const controls =
  document.getElementById(
    "controls"
  );


const startButton =
  document.getElementById(
    "startAnalysis"
  );


const stopButton =
  document.getElementById(
    "stopAnalysis"
  );


const status =
  document.getElementById(
    "status"
  );


const loading =
  document.getElementById(
    "loading"
  );


const analysisPanel =
  document.getElementById(
    "analysisPanel"
  );


const playerCount =
  document.getElementById(
    "playerCount"
  );


const confidence =
  document.getElementById(
    "confidence"
  );


const framesElement =
  document.getElementById(
    "frames"
  );


// ==========================================
// VARIABLEN
// ==========================================


let model = null;

let videoURL = null;

let analyzing = false;

let frameCount = 0;

let animationFrame = null;


// ==========================================
// VIDEO AUSWÄHLEN
// ==========================================


fileInput.addEventListener(
  "change",
  function(event) {


    const file =
      event.target.files[0];


    if (!file) {
      return;
    }


    if (
      !file.type.startsWith(
        "video/"
      )
    ) {

      status.textContent =
        "Bitte wähle eine gültige Videodatei.";

      return;

    }


    // Alte URL entfernen

    if (videoURL) {

      URL.revokeObjectURL(
        videoURL
      );

    }


    // Neue Video URL

    videoURL =
      URL.createObjectURL(
        file
      );


    video.src =
      videoURL;


    video.load();


    // Video sichtbar machen

    videoWrapper.style.display =
      "block";


    controls.style.display =
      "flex";


    analysisPanel.style.display =
      "block";


    status.textContent =
      "Video geladen: " +
      file.name;


    // Canvas Größe anpassen

    video.addEventListener(
      "loadedmetadata",
      setupCanvas,
      {
        once: true
      }
    );


  }
);


// ==========================================
// CANVAS AN VIDEO ANPASSEN
// ==========================================


function setupCanvas() {


  overlay.width =
    video.videoWidth;


  overlay.height =
    video.videoHeight;


  console.log(
    "Video:",
    video.videoWidth,
    "x",
    video.videoHeight
  );


}


// ==========================================
// KI MODELL LADEN
// ==========================================


async function loadModel() {


  if (model) {

    return model;

  }


  loading.style.display =
    "block";


  status.textContent =
    "🤖 KI-Modell wird geladen. Das kann beim ersten Mal etwas dauern...";


  try {


    model =
      await cocoSsd.load();


    loading.style.display =
      "none";


    status.textContent =
      "✅ KI-Modell bereit. Du kannst die Analyse starten.";


    return model;


  } catch (error) {


    console.error(
      error
    );


    loading.style.display =
      "none";


    status.textContent =
      "❌ Das KI-Modell konnte nicht geladen werden.";


    throw error;

  }

}


// ==========================================
// ANALYSE STARTEN
// ==========================================


startButton.addEventListener(
  "click",
  async function() {


    if (!video.src) {

      status.textContent =
        "Bitte zuerst ein Video auswählen.";

      return;

    }


    try {


      // KI laden

      await loadModel();


      analyzing =
        true;


      frameCount =
        0;


      // Video starten

      await video.play();


      status.textContent =
        "🤖 KI analysiert das Video...";


      // Analyse starten

      detectFrame();


    } catch (error) {


      console.error(
        error
      );


      status.textContent =
        "Fehler beim Starten der Analyse.";

    }

  }
);


// ==========================================
// ANALYSE STOPPEN
// ==========================================


stopButton.addEventListener(
  "click",
  function() {


    analyzing =
      false;


    if (animationFrame) {

      cancelAnimationFrame(
        animationFrame
      );

    }


    video.pause();


    status.textContent =
      "⏹ Analyse gestoppt.";

  }
);


// ==========================================
// FRAME ANALYSIEREN
// ==========================================


async function detectFrame() {


  if (
    !analyzing ||
    video.paused ||
    video.ended
  ) {


    if (video.ended) {

      analyzing =
        false;


      status.textContent =
        "✅ Videoanalyse abgeschlossen.";

    }


    return;

  }


  // Erkennung durchführen

  const predictions =
    await model.detect(
      video
    );


  // Canvas löschen

  ctx.clearRect(
    0,
    0,
    overlay.width,
    overlay.height
  );


  // Nur Personen auswählen

  const players =
    predictions.filter(
      prediction =>
        prediction.class ===
        "person" &&
        prediction.score >
        0.35
    );


  // Spieler zeichnen

  players.forEach(
    (player, index) => {


      const [
        x,
        y,
        width,
        height
      ] =
        player.bbox;


      // Box

      ctx.strokeStyle =
        "#00FF66";


      ctx.lineWidth =
        4;


      ctx.strokeRect(
        x,
        y,
        width,
        height
      );


      // Hintergrund für Label

      ctx.fillStyle =
        "#00FF66";


      const label =
        "Spieler " +
        (index + 1) +
        " " +
        Math.round(
          player.score *
          100
        ) +
        "%";


      const textWidth =
        ctx.measureText(
          label
        ).width;


      ctx.fillRect(
        x,
        Math.max(
          0,
          y - 25
        ),
        textWidth + 12,
        25
      );


      // Text

      ctx.fillStyle =
        "#000000";


      ctx.font =
        "bold 14px Arial";


      ctx.fillText(
        label,
        x + 6,
        Math.max(
          17,
          y - 7
        )
      );


    }
  );


  // Statistik aktualisieren

  playerCount.textContent =
    players.length;


  if (
    players.length > 0
  ) {


    const averageConfidence =
      players.reduce(
        (sum, player) =>
          sum +
          player.score,
        0
      ) /
      players.length;


    confidence.textContent =
      Math.round(
        averageConfidence *
        100
      ) +
      "%";


  } else {


    confidence.textContent =
      "0%";

  }


  frameCount++;


  framesElement.textContent =
    frameCount;


  // Nächsten Frame analysieren

  animationFrame =
    requestAnimationFrame(
      detectFrame
    );


}


// ==========================================
// VIDEO ENDE
// ==========================================


video.addEventListener(
  "ended",
  function() {


    analyzing =
      false;


    ctx.clearRect(
      0,
      0,
      overlay.width,
      overlay.height
    );


    status.textContent =
      "✅ Videoanalyse abgeschlossen.";

  }
);


// ==========================================
// VIDEO PAUSE
// ==========================================


video.addEventListener(
  "pause",
  function() {


    if (analyzing) {

      status.textContent =
        "⏸ Video pausiert – Analyse wartet.";

    }

  }
);


// ==========================================
// AUFRÄUMEN
// ==========================================


window.addEventListener(
  "beforeunload",
  function() {


    if (videoURL) {

      URL.revokeObjectURL(
        videoURL
      );

    }

  }
);


</script>

</body>
</html>
