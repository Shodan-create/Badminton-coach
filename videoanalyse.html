<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI Badminton Videoanalyse (Next-Gen)</title>
    
    <!-- Die brandneuen, offiziellen Next-Gen Skripte (Kompatibel mit v1.0+) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .controls {
            margin: 20px 0;
        }
        .status {
            color: #ffcc00;
            font-weight: bold;
            font-size: 1.2em;
        }
        #canvas-holder {
            display: inline-block;
            margin-top: 10px;
            border: 4px solid #333;
            border-radius: 8px;
            background-color: #000;
            overflow: hidden;
        }
        video {
            display: none; /* Versteckt das rohe Video, p5 übernimmt das Zeichnen */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Badminton KI-Bewegungsanalyse</h1>
    <p>Lade dein Video hoch. Die neue KI-Engine zeichnet dein Skelett live ins Bild.</p>
    
    <div class="controls">
        <input type="file" id="fileInput" accept="video/*">
        <p id="status" class="status">KI wird geladen... Bitte warten.</p>
    </div>

    <div id="canvas-holder"></div>
    <video id="video" controls playsinline></video>
</div>

<script>
    let video;
    let bodyPose;
    let poses = [];
    const statusText = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    // 1. p5.js bereitet das Videofeld vor
    function setup() {
        const canvas = createCanvas(640, 480);
        canvas.parent('canvas-holder');

        // Holt das Video-Element aus dem HTML
        video = select('#video');
        
        // Nutzt das brandneue 'MoveNet' Modell der Next-Gen Version von ml5
        bodyPose = ml5.bodyPose('MoveNet', modelReady);
    }

    function modelReady() {
        statusText.innerText = "KI startbereit! Bitte wähle jetzt ein Video aus.";
        statusText.style.color = "#00ffcc";
    }

    // 2. Sobald die KI läuft, trackt sie kontinuierlich das Skelett
    function gotPoses(results) {
        poses = results;
    }

    // 3. Verarbeitet den Video-Upload
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0]; // Holt die Datei absolut sicher ab
        if (file) {
            const fileURL = URL.createObjectURL(file);
            video.elt.src = fileURL;
            video.elt.load();
            
            // Wichtig: Wartet kurz, bis das Video bereit ist, und startet dann das Tracking
            video.elt.onloadeddata = function() {
                video.elt.play();
                // Startet die kontinuierliche Erkennung auf dem Video-Stream
                bodyPose.detectStart(video, gotPoses);
                statusText.innerText = "Video läuft! Analysiere Laufweg & Schlagtechnik...";
                statusText.style.color = "#ffcc00";
            };
        }
    });

    // 4. p5.js zeichnet das Bild und die Linien (Loop)
    function draw() {
        // Zeichnet das aktuelle Videobild auf das Anzeigefeld
        image(video, 0, 0, width, height);

        // Wenn Personen gefunden wurden, zeichnen wir Punkte und Verbindungslinien
        if (poses.length > 0) {
            drawSkeleton();
        }
    }

    function drawSkeleton() {
        // Schleife durch alle gefundenen Personen
        for (let i = 0; i < poses.length; i++) {
            let pose = poses[i];

            // 1. Zeichne die Gelenkpunkte (Schultern, Knie, Ellbogen etc.)
            for (let j = 0; j < pose.keypoints.length; j++) {
                let keypoint = pose.keypoints[j];
                // Nur zeichnen, wenn sich die KI sicher genug ist
                if (keypoint.confidence > 0.3) {
                    fill(0, 255, 204); // Schickes Neongrün
                    noStroke();
                    ellipse(keypoint.x, keypoint.y, 10, 10);
                }
            }

            // 2. Zeichne die Verbindungslinien (Knochen) mithilfe der neuen ml5-Struktur
            if (pose.connections) {
                for (let j = 0; j < pose.connections.length; j++) {
                    let connection = pose.connections[j];
                    let partA = connection[0];
                    let partB = connection[1];
                    
                    if (partA && partB && partA.confidence > 0.3 && partB.confidence > 0.3) {
                        stroke(255, 255, 255); // Weiße Linien
                        strokeWeight(3);
                        line(partA.x, partA.y, partB.x, partB.y);
                    }
                }
            }
        }
    }
</script>

</body>
</html>
