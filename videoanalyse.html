<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Badminton Videoanalyse</title>
    
    <!-- Die offiziellen, topaktuellen Bibliotheken direkt von Google AI Edge -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .video-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            max-width: 100%;
        }
        video {
            display: block;
            max-width: 100%;
            height: auto;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .controls {
            margin: 20px 0;
        }
        .status {
            color: #ffcc00;
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Badminton KI-Bewegungsanalyse</h1>
    <p>Lade dein Badminton-Video hoch. Das Skelett-Tracking startet automatisch beim Abspielen.</p>
    
    <div class="controls">
        <input type="file" id="fileInput" accept="video/*">
        <p id="status" class="status">KI-Modell wird initialisiert...</p>
    </div>

    <div class="video-container">
        <video id="video" controls playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const statusText = document.getElementById('status');

    let poseLandmarker;
    let animationFrameId;

    // 1. Neues MediaPipe-System über das globale Objekt initialisieren
    async function initPose() {
        try {
            // Holt sich den Resolver direkt aus dem geladenen Bundle-Skript
            const vision = await mediapipe.tasks.vision.FilesetResolver.forVisionTasks(
                "https://jsdelivr.net"
            );
            
            poseLandmarker = await mediapipe.tasks.vision.PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://googleapis.com",
                    delegate: "GPU"
                },
                runningMode: "VIDEO"
            });
            
            statusText.innerText = "KI startbereit! Bitte wähle ein Video aus.";
            statusText.style.color = "#00ffcc";
        } catch (err) {
            statusText.innerText = "Ladefehler: " + err;
            statusText.style.color = "#ff3333";
            console.error(err);
        }
    }

    // 2. Lokales Video einlesen und im Player starten
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; // Vergiss das [0] nicht, um das Video zu greifen!
        if (file) {
            const fileURL = URL.createObjectURL(file);
            video.src = fileURL;
            video.load();
            statusText.innerText = "Video geladen. Klicke auf Play!";
            statusText.style.color = "#00ffcc";
        }
    });

    video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    });

    // 3. Frame für Frame an die KI senden, wenn das Video läuft
    video.addEventListener('play', () => {
        statusText.innerText = "Analysiere Laufweg & Schlägerhaltung...";
        statusText.style.color = "#ffcc00";
        
        function processFrame() {
            if (video.paused || video.ended) return;

            if (poseLandmarker) {
                const timestamp = performance.now();
                const results = poseLandmarker.detectForVideo(video, timestamp);
                drawSkeleton(results);
            }
            animationFrameId = requestAnimationFrame(processFrame);
        }
        animationFrameId = requestAnimationFrame(processFrame);
    });

    video.addEventListener('pause', () => {
        cancelAnimationFrame(animationFrameId);
    });

    // 4. Zeichnen der Punkte und Linien
    function drawSkeleton(results) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!results.landmarks || results.landmarks.length === 0) return;

        const landmarks = results.landmarks[0];

        // Gelenke zeichnen
        landmarks.forEach((landmark) => {
            if (landmark.visibility > 0.5) {
                ctx.beginPath();
                ctx.arc(landmark.x * canvas.width, landmark.y * canvas.height, 5, 0, 2 * Math.PI);
                ctx.fillStyle = "#00ffcc";
                ctx.fill();
            }
        });

        // Vorgefertigte Knochen-Verbindungen (Schultern, Arme, Beine)
        const connections = [
            [11, 12], [11, 13], [13, 15], [12, 14], [14, 16], // Arme
            [11, 23], [12, 24], [23, 24],                     // Torso
            [23, 25], [25, 27], [24, 26], [26, 28]              // Beine
        ];

        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;

        connections.forEach(([s, e]) => {
            const start = landmarks[s];
            const end = landmarks[e];
            if (start && end && start.visibility > 0.5 && end.visibility > 0.5) {
                ctx.beginPath();
                ctx.moveTo(start.x * canvas.width, start.y * canvas.height);
                ctx.lineTo(end.x * canvas.width, end.y * canvas.height);
                ctx.stroke();
            }
        });
    }

    // Start
    initPose();
</script>

</body>
</html>
